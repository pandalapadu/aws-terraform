name: Terraform Destroy Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm infrastructure deletion"
        required: true

jobs:
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./CI-CD

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Validate Destroy Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ You must type DESTROY to proceed"
            exit 1
          fi

      # ✅ IMPORTANT FIX
      - name: Terraform Init (S3 Backend)
        run: terraform init -input=false -reconfigure

      # ✅ DEBUG STEP (VERY IMPORTANT)
      - name: Check Terraform State
        run: terraform state list

      # ✅ DESTROY
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false